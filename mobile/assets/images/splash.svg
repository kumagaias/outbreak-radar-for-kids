<svg width="1284" height="2778" viewBox="0 0 1284 2778" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient with teal colors -->
  <defs>
    <linearGradient id="splashBgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDFA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5EEAD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconBgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5EEAD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0FDFA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1284" height="2778" fill="url(#splashBgGradient)"/>
  
  <!-- Center icon group (scaled up 1.5x) -->
  <g transform="translate(642, 1389)">
    <!-- Icon background circle -->
    <circle cx="0" cy="0" r="384" fill="url(#iconBgGradient)"/>
    
    <!-- Shield shape (protection symbol) -->
    <path d="M 0 -150 L 141 -90 L 141 60 Q 141 210 0 300 Q -141 210 -141 60 L -141 -90 Z" 
          fill="url(#shieldGradient)" stroke="#0F766E" stroke-width="6"/>
    
    <!-- Radar circles -->
    <circle cx="0" cy="60" r="135" fill="none" stroke="#0D9488" stroke-width="3" opacity="0.3"/>
    <circle cx="0" cy="60" r="90" fill="none" stroke="#0D9488" stroke-width="3" opacity="0.5"/>
    <circle cx="0" cy="60" r="45" fill="none" stroke="#0D9488" stroke-width="3" opacity="0.7"/>
    
    <!-- Center dot (location marker) -->
    <circle cx="0" cy="60" r="15" fill="#0F766E"/>
    
    <!-- Radar sweep line -->
    <line x1="0" y1="60" x2="0" y2="-75" stroke="#0F766E" stroke-width="5" opacity="0.8"/>
    
    <!-- Child silhouette (simplified) -->
    <circle cx="0" cy="15" r="22" fill="#0F766E"/>
    <ellipse cx="0" cy="75" rx="30" ry="45" fill="#0F766E"/>
    
    <!-- Plus symbol (health/medical) -->
    <rect x="96" y="15" width="45" height="15" rx="7" fill="#F59E0B"/>
    <rect x="111" y="0" width="15" height="45" rx="7" fill="#F59E0B"/>
  </g>
  
  <!-- App name (larger text) -->
  <text x="642" y="1900" font-family="Arial, sans-serif" font-size="64" font-weight="bold" 
        fill="#0F766E" text-anchor="middle">Outbreak Radar</text>
  <text x="642" y="1980" font-family="Arial, sans-serif" font-size="64" font-weight="bold" 
        fill="#0F766E" text-anchor="middle">for Kids</text>
</svg>
