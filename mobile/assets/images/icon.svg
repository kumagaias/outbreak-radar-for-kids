<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient with teal colors -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5EEAD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0FDFA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="512" cy="512" r="512" fill="url(#bgGradient)"/>
  
  <!-- Shield shape (protection symbol) -->
  <path d="M 512 200 L 700 280 L 700 480 Q 700 680 512 800 Q 324 680 324 480 L 324 280 Z" 
        fill="url(#shieldGradient)" stroke="#0F766E" stroke-width="8"/>
  
  <!-- Radar circles -->
  <circle cx="512" cy="480" r="180" fill="none" stroke="#0D9488" stroke-width="4" opacity="0.3"/>
  <circle cx="512" cy="480" r="120" fill="none" stroke="#0D9488" stroke-width="4" opacity="0.5"/>
  <circle cx="512" cy="480" r="60" fill="none" stroke="#0D9488" stroke-width="4" opacity="0.7"/>
  
  <!-- Center dot (location marker) -->
  <circle cx="512" cy="480" r="20" fill="#0F766E"/>
  
  <!-- Radar sweep line -->
  <line x1="512" y1="480" x2="512" y2="300" stroke="#0F766E" stroke-width="6" opacity="0.8"/>
  
  <!-- Child silhouette (simplified) -->
  <circle cx="512" cy="420" r="30" fill="#0F766E"/>
  <ellipse cx="512" cy="500" rx="40" ry="60" fill="#0F766E"/>
  
  <!-- Plus symbol (health/medical) -->
  <rect x="640" y="340" width="60" height="20" rx="10" fill="#F59E0B"/>
  <rect x="660" y="320" width="20" height="60" rx="10" fill="#F59E0B"/>
</svg>
