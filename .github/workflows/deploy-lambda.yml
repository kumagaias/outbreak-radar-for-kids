name: Deploy Lambda Functions

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'backend/lambda/outbreak-fetcher/**'
      - '.github/workflows/deploy-lambda.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      nova-changed: ${{ steps.filter.outputs.nova }}
      outbreak-changed: ${{ steps.filter.outputs.outbreak }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nova:
              - 'backend/**'
              - '!backend/lambda/outbreak-fetcher/**'
            outbreak:
              - 'backend/lambda/outbreak-fetcher/**'

  deploy-nova-recommendations:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.nova-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-outbreak-radar-for-kids-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push nova-recommendations image
        working-directory: backend
        run: |
          docker build -t nova-recommendations:latest .
          docker tag nova-recommendations:latest ${{ env.ECR_REGISTRY }}/nova-recommendations-dev:latest
          docker push ${{ env.ECR_REGISTRY }}/nova-recommendations-dev:latest

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name nova-recommendations-dev \
            --image-uri ${{ env.ECR_REGISTRY }}/nova-recommendations-dev:latest \
            --region ${{ env.AWS_REGION }}

  deploy-outbreak-fetcher:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.outbreak-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::843925270284:role/github-actions-outbreak-radar-for-kids-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push outbreak-fetcher image
        working-directory: backend/lambda/outbreak-fetcher
        run: |
          docker build -t outbreak-data-fetcher:latest .
          docker tag outbreak-data-fetcher:latest ${{ env.ECR_REGISTRY }}/outbreak-data-fetcher-dev:latest
          docker push ${{ env.ECR_REGISTRY }}/outbreak-data-fetcher-dev:latest

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name outbreak-data-fetcher-dev \
            --image-uri ${{ env.ECR_REGISTRY }}/outbreak-data-fetcher-dev:latest \
            --region ${{ env.AWS_REGION }}
